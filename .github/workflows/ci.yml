# CI: gofmt + go vet + tests, twice (plain and -race), against a real Redis 7
# service so the integration tests (which skip without a reachable
# 127.0.0.1:6379) actually run — including the notify Lua path that only a
# live Redis exercises.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # The service Redis below is dedicated to this job, so the one test
      # that issues a server-wide SCRIPT FLUSH may run here (it is skipped
      # by default to keep `go test ./...` safe against a shared Redis).
      LAKE_TEST_SCRIPT_FLUSH: "1"
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needed on:" && echo "$out" && exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 ./...

      - name: go test -race
        run: go test -count=1 -race ./...
